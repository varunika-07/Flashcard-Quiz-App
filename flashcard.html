<!DOCTYPE html>
<html>
<head>
    <title>Flashcard Quiz App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            margin: 10px;
            padding: 10px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Flashcard Quiz</h2>

<div class="card">
    <h3 id="question"></h3>
    <p id="answer" style="display:none;"></p>

    <button onclick="showAnswer()">Show Answer</button><br>
    <button onclick="prevCard()">Previous</button>
    <button onclick="nextCard()">Next</button>
</div>

<script>
let flashcards = [
    {q: "What is HTML?", a: "HyperText Markup Language"},
    {q: "What is CSS?", a: "Style sheet language"},
    {q: "What is JavaScript?", a: "Programming language for web"}
];

let index = 0;

function loadCard() {
    document.getElementById("question").innerText = flashcards[index].q;
    document.getElementById("answer").innerText = flashcards[index].a;
    document.getElementById("answer").style.display = "none";
}

function showAnswer() {
    document.getElementById("answer").style.display = "block";
}

function nextCard() {
    index = (index + 1) % flashcards.length;
    loadCard();
}

function prevCard() {
    index = (index - 1 + flashcards.length) % flashcards.length;
    loadCard();
}

loadCard();
</script>

</body>
</html>
